  // 坐标转换相关函数（保留备用）
  const PI = Math.PI;
  const a = 6378245.0;
  const ee = 0.00669342162296594323;
  function bd09ToGcj02(bd_lon, bd_lat) {
    const x_pi = PI * 3000.0 / 180.0;
    const x = bd_lon - 0.0065;
    const y = bd_lat - 0.006;
    const z = Math.sqrt(x * x + y * y) - 0.00002 * Math.sin(y * x_pi);
    const theta = Math.atan2(y, x) - 0.000003 * Math.cos(x * x_pi);
    return [z * Math.cos(theta), z * Math.sin(theta)];
  }
  function outOfChina(lon, lat) {
    return !(lon > 73.66 && lon < 135.05 && lat > 3.86 && lat < 53.55);
  }
  function transformLat(x, y) {
    let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
    ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
    ret += (20.0 * Math.sin(y * PI) + 40.0 * Math.sin(y / 3.0 * PI)) * 2.0 / 3.0;
    ret += (160.0 * Math.sin(y / 12.0 * PI) + 320 * Math.sin(y * PI / 30.0)) * 2.0 / 3.0;
    return ret;
  }
  function transformLon(x, y) {
    let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
    ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
    ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
    ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
    return ret;
  }
  function gcj02ToWgs84(gcj_lon, gcj_lat) {
    if (outOfChina(gcj_lon, gcj_lat)) return [gcj_lon, gcj_lat];
    let dlat = transformLat(gcj_lon - 105.0, gcj_lat - 35.0);
    let dlon = transformLon(gcj_lon - 105.0, gcj_lat - 35.0);
    const radlat = gcj_lat / 180.0 * PI;
    let magic = Math.sin(radlat);
    magic = 1 - ee * magic * magic;
    const sqrtmagic = Math.sqrt(magic);
    dlat = (dlat * 180.0) / ((a * (1 - ee)) / (magic * sqrtmagic) * PI);
    dlon = (dlon * 180.0) / (a / sqrtmagic * Math.cos(radlat) * PI);
    const mglat = gcj_lat + dlat;
    const mglon = gcj_lon + dlon;
    return [gcj_lon * 2 - mglon, gcj_lat * 2 - mglat];
  }
  function bd09ToWgs84(bd_lon, bd_lat) {
    const [gcj_lon, gcj_lat] = bd09ToGcj02(bd_lon, bd_lat);
    return gcj02ToWgs84(gcj_lon, gcj_lat);
  }

    // 创建点位样式
    function createMarkerStyle(name, config) {
      return [

        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentFilterType = this.getAttribute('data-type');
        applyFilter(currentFilterType);
        hidePointInfo();
      });
    });

    // 应用筛选逻辑
    function applyFilter(filterType) {
      vectorLayer.getSource().getFeatures().forEach(feature => {
        const geometry = feature.getGeometry();
        if (!(geometry instanceof ol.geom.Point)) return;

        const name = feature.get('name');
        const type = feature.get('type');

        if (!name || !locationConfig[name]) return;

        let shouldShow = false;
        if (filterType === 'all') {
          shouldShow = true;
        } else if (type === filterType) {
          shouldShow = true;
        }

        feature.setStyle(shouldShow ? createMarkerStyle(name, locationConfig[name]) : null);
      });
    }

    // 显示点位信息
    function showPointInfo(pointName, pointData) {
      activePoint.name = pointName;
      activePoint.config = pointData;

      document.getElementById('point-name').textContent = pointName;
      const contentDiv = document.getElementById('point-info-content');

      // 显示土地类型相关信息
      contentDiv.innerHTML = `
                <p><span class="info-label">土地类型：</span><span class="info-value">${pointData.type}</span></p>
                <p><span class="info-label">总面积：</span><span class="info-value">${pointData.area || '无'}</span></p>
                <p><span class="info-label">待流转土地面积：</span><span class="info-value">${pointData.ploughArea || '无'}</span></p>
                <p><span class="info-label">资源类型：</span><span class="info-value">${pointData.desc || '无'}</span></p>
            `;

      // 设置弹窗位置
      const coord = ol.proj.fromLonLat(pointData.coord);
      pointInfoOverlay.setPosition(coord);

      // 显示弹窗（带动画）
      pointInfoElement.classList.remove('active');
      void pointInfoElement.offsetWidth;
      pointInfoElement.classList.add('active');
    }

    // 隐藏点位信息
    function hidePointInfo() {
      if (pointInfoElement) {
        pointInfoElement.classList.remove('active');
      }
      activePoint.name = '';
      activePoint.config = null;
    }

    // 地图点击事件
    map.on('click', function(event) {
      // 点击弹窗内部不处理
      if (pointInfoElement) {
        const pointOverlayRect = pointInfoElement.getBoundingClientRect();
        const clickInPointOverlay = event.pixel &&
                event.pixel[0] >= pointOverlayRect.left &&
                event.pixel[0] <= pointOverlayRect.right &&
                event.pixel[1] >= pointOverlayRect.top &&
                event.pixel[1] <= pointOverlayRect.bottom;
        if (clickInPointOverlay) return;
      }

      // 检测点击的点位
      map.forEachFeatureAtPixel(event.pixel, function(feature) {
        const geometry = feature.getGeometry();
        if (!(geometry instanceof ol.geom.Point)) return;

        const name = feature.get('name');
        if (!name || !locationConfig[name]) return;

        // 显示点位信息
        showPointInfo(name, locationConfig[name]);
      }, {
        layerFilter: function(layer) {
          return layer === vectorLayer;
        }
      });
    });

    console.log('地图初始化完成，所有点位已添加');

  // 接收外部消息（缩放控制）
  window.addEventListener('message', function(event) {
    if (event.origin !== 'https://modao.cc' && event.origin !== 'https://www.modao.cc') return;
    if (!map) return;
    if (event.data.action === 'zoomIn') {
      const currentZoom = map.getView().getZoom();
      if (currentZoom < map.getView().getMaxZoom()) map.getView().setZoom(currentZoom + 1);
    } else if (event.data.action === 'zoomOut') {
      const currentZoom = map.getView().getZoom();
      if (currentZoom > map.getView().getMinZoom()) map.getView().setZoom(currentZoom - 1);
    }
  }, false);
