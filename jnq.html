    '北闸口镇',
    '海河教育园区',
    '咸水沽镇',
    '津南开发区东区',
    '津南国家农业园区',
    '辛庄镇',
    '双林农场',
    '铁路十八局',
    '双桥河镇',
    '双港镇',
    '双林街道办事处',
    '津南开发区西区',
    '津南区双新街道办事处',
    '小站镇',
    '八里台镇'
  ];

  // 重构特征存储变量
  let jinnanKeepFeatures = []; // 津南区需要保留的17个特征
  let jinnanRemoveFeatures = []; // 津南区需要隐藏的其他特征
  let otherAreaFeatures = []; // 非津南区的所有特征

  window.onload = function() {
    // 1. 天地图卫星底图
    const tdtVectorLayer = new ol.layer.Tile({
      source: new ol.source.XYZ({
        url: `http://t0.tianditu.gov.cn/img_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=img&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=${TDT_TK}`,
        crossOrigin: 'anonymous'
      })
    });

    // 2. 天地图注记图层
    const tdtAnnotationLayer = new ol.layer.Tile({
      source: new ol.source.XYZ({
        url: `http://t0.tianditu.gov.cn/cia_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=cia&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=${TDT_TK}`,
        crossOrigin: 'anonymous'
      })
    });

    // 3. 解析GeoJSON并精细化分类特征（核心修改）
    const allFeatures = new ol.format.GeoJSON().readFeatures(geoJSON, {
      featureProjection: 'EPSG:3857' // 转换为OpenLayers墨卡托投影
    });

    allFeatures.forEach(feature => {
      const name = feature.get('name');
      if (!name) return; // 过滤无名称的特征

      // 先判断是否是津南区下属区域
      if (KEEP_JINNAN_AREAS.includes(name)) {
        // 属于17个保留区域 → 加入保留列表
        jinnanKeepFeatures.push(feature);
      } else if (name.includes('津南区') && !KEEP_JINNAN_AREAS.includes(name)) {
        // 属于津南区但不在保留列表 → 加入津南待隐藏列表
        jinnanRemoveFeatures.push(feature);
      } else {
        // 非津南区区域 → 加入其他区域列表
        otherAreaFeatures.push(feature);
      }
    });

    // 4. 创建矢量数据源和图层
    vectorSource = new ol.source.Vector();
    // 初始添加所有特征（显示全部区域）
    vectorSource.addFeatures(jinnanKeepFeatures);
    vectorSource.addFeatures(jinnanRemoveFeatures);
    vectorSource.addFeatures(otherAreaFeatures);

    const vectorLayer = new ol.layer.Vector({
      source: vectorSource,
      style: new ol.style.Style({
        stroke: new ol.style.Stroke({
          color: '#6594FF', // 荧光蓝边界
          width: 2
        }),
        fill: new ol.style.Fill({
          color: 'transparent' // 完全透明填充
        })
      })
    });

    // 5. 初始化地图
    map = new ol.Map({
      target: 'map',
      layers: [tdtVectorLayer, tdtAnnotationLayer, vectorLayer],
      view: new ol.View({
        center: ol.proj.fromLonLat([117.200983, 39.084158]), // 天津中心点
        zoom: 8.5,
        maxZoom: 18,
        minZoom: 7,
        smoothResolutionConstraint: true
      })
    });

    // 6. 地图定位动画
    const tianjinCenter = ol.proj.fromLonLat([117.200983, 39.084158]); // 天津中心点
    const jinnanCenter = ol.proj.fromLonLat([117.382549,38.949577]); // 津南区中心

    // 第一步：先让地图适配所有天津区域的范围
    map.getView().fit(vectorSource.getExtent(), {
      padding: [50, 50, 50, 50],
      maxZoom: 9
    });

    // 第二步：延迟动画到津南区中心
    setTimeout(() => {
      map.getView().animate({
        center: jinnanCenter,
        zoom: HIDE_OTHER_ZOOM,
        duration: 1500
      }, () => {
        updateRegionVisibility(); // 动画完成后更新边界显示
      });
    }, 500);

    map.updateSize();

    // 7. 津南区标注
    const tjGeoCoordMap = {
      "津南区":[117.382549,38.949577],
      "八里台镇":[117.333984375,38.84337821173705],
      "小站镇":[117.42320001125336,38.86495925316811],
      "双新街道办事处":[117.27142721414566,39.001122284009654],
      "津南开发区西区":[117.30038970708847,39.03324863376349],
      "双林街道办事处":[117.26602256298065,39.04232580805953],
      "葛沽镇":[117.54251003265381,38.958038686975186],
      "双港镇":[117.29269122238934,39.061742398597644],
      "双桥河镇":[117.44339972734451,38.976884494585875],
      "海棠街道":[117.29188442230225,39.0603621104039],
      "双林农场":[117.29591578245163,39.05228498266072],
      "辛庄镇":[117.29287147521973,39.00211029922514],
      "津南国家农业园区":[117.34316557645798,38.93036206698707],
      "津南开发区东区":[117.42125004529953,38.96735055288397],
      "咸水沽镇":[117.36151456832886,39.012216860631185],
      "海河教育园区":[117.35807597637177,39.01399875047181],
      "北闸口镇":[117.37972676753998,38.91100906027876],
      "津南区":[117.382549,38.949577],
      "长青办事处":[117.30596601963043,39.04059046416165],
    };
    const tjDatas = [
            { name: '津南区', value: "" },
            { name: '八里台镇', value: "" },
            { name: '小站镇', value: "" },
            { name: '双新街道办事处', value: "" },
            { name: '津南开发区西区', value: "" },
            { name: '双林街道办事处', value: "" },
            { name: '葛沽镇', value: "" },
            { name: '双港镇', value: "" },
            { name: '双桥河镇', value: "" },
            { name: '海棠街道', value: "" },
            { name: '双林农场', value: "" },
            { name: '辛庄镇', value: "" },
            { name: '津南国家农业园区', value: "" },
            { name: '津南开发区东区', value: "" },
            { name: '咸水沽镇', value: "" },
            { name: '海河教育园区', value: "" },
            { name: '北闸口镇', value: "" },
            { name: '长青办事处', value: "" },
    ];

    // 创建标注点
    tjDatas.forEach(item => {
      const coord = tjGeoCoordMap[item.name];
      if (!coord) return;

      const marker = new ol.Feature({
        geometry: new ol.geom.Point(ol.proj.fromLonLat(coord)),
        name: item.name,
        value: item.value
      });

      marker.setStyle(new ol.style.Style({
        image: new ol.style.Circle({
          radius: 6,
          fill: new ol.style.Fill({ color: '#ff5c5c' }),
          stroke: new ol.style.Stroke({ color: '#fff', width: 2 })
        }),
        text: new ol.style.Text({
          text: `${item.name}\n${item.value}`,
          offsetX: 15,
          offsetY: -10,
          fill: new ol.style.Fill({ color: '#f5dd07' }),
          stroke: new ol.style.Stroke({ color: '#000', width: 2 }),
          font: '20px Arial'
        })
      }));

      vectorSource.addFeature(marker);
    });

    // 8. 监听地图缩放/平移事件，动态控制边界显示
    map.on('moveend', updateRegionVisibility);

    console.log('地图初始化完成，缩放至11级以上将仅显示津南区17个指定区域');
  };

  /**
   * 核心修改：根据缩放级别更新区域边界可见性
   */
  function updateRegionVisibility() {
    if (!map) return;
    const currentZoom = map.getView().getZoom();

    if (currentZoom >= HIDE_OTHER_ZOOM) {
      // 缩放≥11级：仅保留17个指定津南区域，移除其他所有特征
      // 1. 移除非津南区特征
      otherAreaFeatures.forEach(feature => {
        vectorSource.removeFeature(feature);
      });
      // 2. 移除津南区内非保留的特征
      jinnanRemoveFeatures.forEach(feature => {
        vectorSource.removeFeature(feature);
      });
      // 确保保留的17个特征都存在（防止意外被移除）
      jinnanKeepFeatures.forEach(feature => {
        if (!vectorSource.hasFeature(feature)) {
          vectorSource.addFeature(feature);
        }
      });
    } else {
      // 缩放<11级：恢复显示所有特征（避免重复添加）
      // 1. 恢复非津南区特征
      otherAreaFeatures.forEach(feature => {
        if (!vectorSource.hasFeature(feature)) {
          vectorSource.addFeature(feature);
        }
      });
      // 2. 恢复津南区内非保留的特征
      jinnanRemoveFeatures.forEach(feature => {
        if (!vectorSource.hasFeature(feature)) {
          vectorSource.addFeature(feature);
        }
      });
    }
  }

  // 缩放控制（保留原有逻辑）
  window.addEventListener('message', function(event) {
    if (event.origin !== 'https://modao.cc' && event.origin !== 'https://www.modao.cc') {
      return;
    }

    if (!map) return;

    const view = map.getView();
    const currentZoom = view.getZoom();
    const maxZoom = view.getMaxZoom();
    const minZoom = view.getMinZoom();

    if (event.data.action === 'zoomIn') {
      if (currentZoom < maxZoom) {
        view.animate({
          zoom: currentZoom + 1,
          duration: 200
        }, () => {
          updateRegionVisibility(); // 缩放后更新边界
        });
      }
    } else if (event.data.action === 'zoomOut') {
      if (currentZoom > minZoom) {
        view.animate({
          zoom: currentZoom - 1,
          duration: 200
        }, () => {
          updateRegionVisibility(); // 缩放后更新边界
        });
      }
    }
  }, false);
</script>
