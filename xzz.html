<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>天津卫星地图+区划边界（OpenLayers 原生版）</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@7.3.0/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/ol@7.3.0/dist/ol.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #map {
      width: 100vw;
      height: 100vh;
    }
    /* 缩放层级显示样式 */
    #zoom-level {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 8px 15px;
      border-radius: 4px;
      font-size: 14px;
      z-index: 1000;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
<div id="map"></div>
<div id="zoom-level">缩放级别: 11</div>

<script>
  // 天地图密钥
  const TDT_TK = "c7223f2b73b583f3f0ed4ca43f17e40c";

  // 核心配置
  const CONFIG = {
    JINNAN_CENTER: [117.382549, 38.949577],    // 津南区中心坐标
    XIAOZHAN_CENTER: [117.434147, 38.916552],  // 小站镇中心坐标
    HIDE_JINNAN_ZOOM: 13,                      // 隐藏津南区边界的缩放阈值（村级显示）
    SHOW_VILLAGE_ZOOM: 13,                     // 显示村级边界的缩放阈值
    INIT_ZOOM: 11,                             // 初始缩放级别
    MAX_ZOOM: 18,                              // 最大缩放级别
    MIN_ZOOM: 1                                // 最小缩放级别
  };

  // 全局变量
  let map;
  let vectorSource;          // 矢量数据源
  let jinnanFeature = null;  // 津南区边界要素
  let villageFeatures = [];  // 村级边界要素集合
  let annotationFeatures = []; // 标注要素集合

  window.onload = function() {
    // 1. 初始化天地图图层
    // 卫星底图
    const tdtVectorLayer = new ol.layer.Tile({
      source: new ol.source.XYZ({
        url: `http://t0.tianditu.gov.cn/img_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=img&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=${TDT_TK}`,
        crossOrigin: 'anonymous'
      })
    });

    // 注记图层
    const tdtAnnotationLayer = new ol.layer.Tile({
      source: new ol.source.XYZ({
        url: `http://t0.tianditu.gov.cn/cia_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=cia&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=${TDT_TK}`,
        crossOrigin: 'anonymous'
      })
    });

    // 2. 初始化矢量数据源（先空，后续动态添加）
    vectorSource = new ol.source.Vector();

    // 3. 创建矢量图层样式
    const vectorLayer = new ol.layer.Vector({
      source: vectorSource,
      style: new ol.style.Style({
        stroke: new ol.style.Stroke({
          color: '#6594FF', // 荧光蓝边界
          width: 3
        }),
        fill: new ol.style.Fill({
          color: 'rgba(101, 148, 255, 0.1)' // 轻微透明填充，便于识别区域
        })
      })
    });

    // 4. 初始化地图
    map = new ol.Map({
      target: 'map',
      layers: [tdtVectorLayer, tdtAnnotationLayer, vectorLayer],
      view: new ol.View({
        center: ol.proj.fromLonLat(CONFIG.JINNAN_CENTER),
        zoom: CONFIG.INIT_ZOOM,
        maxZoom: CONFIG.MAX_ZOOM,
        minZoom: CONFIG.MIN_ZOOM
      })
    });

    // 5. 解析GeoJSON并分离要素（此处省略完整GeoJSON，仅保留逻辑）
    parseGeoJsonFeatures();

    // 6. 初始加载：只添加津南区边界
    if (jinnanFeature) {
      vectorSource.addFeature(jinnanFeature);
    }

    // 7. 地图定位动画：津南区 → 小站镇
    setTimeout(() => {
      map.getView().animate({
        center: ol.proj.fromLonLat(CONFIG.XIAOZHAN_CENTER),
        zoom: CONFIG.SHOW_VILLAGE_ZOOM,
        duration: 1500
      });
    }, 500);

    // 8. 监听缩放事件，动态切换边界显示
    map.getView().on('change:resolution', function() {
      const currentZoom = map.getView().getZoom();
      // 更新缩放级别显示
      document.getElementById('zoom-level').textContent = `缩放级别: ${Math.round(currentZoom)}`;

      // 核心逻辑：根据缩放级别切换边界
      if (currentZoom >= CONFIG.HIDE_JINNAN_ZOOM) {
        // 缩放级别≥13：隐藏津南区，显示村级边界
        if (jinnanFeature && vectorSource.getFeatureById('jinnan-area')) {
          vectorSource.removeFeature(jinnanFeature);
        }
        addVillageFeatures(); // 添加村级边界
        addAnnotations();     // 添加村级标注
      } else {
        // 缩放级别<13：显示津南区，隐藏村级边界
        if (jinnanFeature && !vectorSource.getFeatureById('jinnan-area')) {
          vectorSource.addFeature(jinnanFeature);
        }
        removeVillageFeatures(); // 移除村级边界
        removeAnnotations();     // 移除村级标注
      }
    });

    // 9. 跨域消息监听（保留原有缩放控制逻辑）
    window.addEventListener('message', function(event) {
      if (event.origin !== 'https://modao.cc' && event.origin !== 'https://www.modao.cc') return;
      if (!map || !map.getView) return;

      const currentZoom = map.getView().getZoom();
      if (event.data?.action === 'zoomIn' && currentZoom < CONFIG.MAX_ZOOM) {
        map.getView().setZoom(currentZoom + 1);
      } else if (event.data?.action === 'zoomOut' && currentZoom > CONFIG.MIN_ZOOM) {
        map.getView().setZoom(currentZoom - 1);
      }
    }, false);

    console.log('地图初始化完成');
  };

      // 分离津南区和村级要素
      allFeatures.forEach(feature => {
        if (!feature || !feature.get) return;
        const name = feature.get('name') || '';

        if (name.trim() === '津南区') {
          // 津南区要素
          jinnanFeature = feature;
          jinnanFeature.setId('jinnan-area');
        } else if (feature.getGeometry().getType() !== 'Point') {
          // 村级边界要素（排除标注点）
          feature.setId(`village-${name}`);
          villageFeatures.push(feature);
        }
      });

      console.error("GeoJSON解析失败：", e);

  // 添加所有村级边界要素
  function addVillageFeatures() {
    villageFeatures.forEach(feature => {
      if (!vectorSource.getFeatureById(feature.getId())) {
        vectorSource.addFeature(feature);
      }
    });
  }

  // 移除所有村级边界要素
  function removeVillageFeatures() {
    villageFeatures.forEach(feature => {
      if (vectorSource.getFeatureById(feature.getId())) {
        vectorSource.removeFeature(feature);
      }
    });
  }

    annotationFeatures.forEach(marker => {
      if (vectorSource.getFeatureById(marker.getId())) {
        vectorSource.removeFeature(marker);
      }
    });
    annotationFeatures = []; // 清空标注数组
  }
</script>
